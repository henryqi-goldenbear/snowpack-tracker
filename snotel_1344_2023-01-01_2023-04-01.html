<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SNOTEL Table</title>
  <style>
    body {
      margin: 24px;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #000000;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 24px;
    }

    .snotel-table {
      border-collapse: collapse;
      border: 2px solid #000000;
      font-size: 14px;
      min-width: 720px;
    }

    .snotel-table th,
    .snotel-table td {
      border: 1px solid #000000;
      padding: 10px 12px;
      text-align: center;
      color: #000000;
      background: #ffffff;
    }

    .snotel-table th {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <h1>Alta Lakes (11290 ft)</h1>
  <table class="dataframe snotel-table">
  <thead>
    <tr style="text-align: right;">
      <th>date</th>
      <th>swe_in</th>
      <th>snow_depth_in</th>
      <th>precip_in</th>
      <th>tmax_f</th>
      <th>tmin_f</th>
      <th>tavg_f</th>
    </tr>
  </thead>
  <tbody>
  </tbody>
</table>
</body>
</html>
